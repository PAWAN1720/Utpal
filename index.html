<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GJV Translator - Official Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #00F2FE;
            --bg-color: #0f172a;
            --text-light: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, #3b0764, transparent 40%),
                              radial-gradient(circle at bottom left, #082f49, transparent 40%);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        nav {
            position: absolute;
            top: 20px;
            right: 30px;
            z-index: 100;
        }

        .lang-selector {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            outline: none;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        /* --- Main Container --- */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 80px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* --- Sequential Animations --- */
        .seq-item {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s ease forwards;
        }

        #app-name {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            animation-delay: 0.5s;
        }

        /* LOGO STYLING WITH YOUR IMAGE */
        #app-logo-container {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            box-shadow: 0 0 30px rgba(108, 99, 255, 0.4);
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeUp 1s ease 1s forwards, float 3s ease-in-out infinite alternate 2s;
        }

        #app-logo-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-color);
        }

        .info-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 800px;
            animation-delay: 1.5s;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* --- Buttons --- */
        .cta-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            text-decoration: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: none;
        }

        .download-btn {
            color: white;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            box-shadow: 0 10px 20px rgba(108, 99, 255, 0.4);
            animation: pulseGlow 2s infinite;
        }

        .try-btn {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border) !important;
        }

        .btn:hover { transform: translateY(-5px); }
        .try-btn:hover { background: rgba(255,255,255,0.2); }

        /* --- MODAL FOR "TRY IT NOW" --- */
        #previewModal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            position: relative;
            width: 95%;
            height: 90%;
            background: #0f1a40; 
            border-radius: 20px;
            border: 1px solid var(--secondary);
            overflow: hidden;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            z-index: 1100;
            transition: 0.3s;
        }
        
        .close-modal:hover { color: var(--secondary); }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes float { from { transform: translateY(0px); } to { transform: translateY(-15px); } }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(108, 99, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(108, 99, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(108, 99, 255, 0); }
        }

        @media(max-width: 768px) {
            #app-name { font-size: 2.5rem; }
            .cta-group { flex-direction: column; }
        }
    </style>
</head>
<body>

    <nav>
        <select class="lang-selector">
            <option>English</option>
            <option>Assamese</option>
        </select>
    </nav>

    <div class="container">
        
        <h1 id="app-name" class="seq-item">GJV Translator</h1>
        
        <div id="app-logo-container" class="seq-item">
            <img src="1000000471.jpg" alt="GJV Logo">
        </div>

        <div class="info-card seq-item">
            <h2>GJV Translator App</h2>
            <p>The most advanced Assamese translation tool with built-in grammar learning, music player, and educational games.</p>
            
            <div class="cta-group">
                <button onclick="openPreview()" class="btn try-btn">
                    <i class="fa-solid fa-play"></i> Try It Now
                </button>
                
                <a href="gjv-translator-fixed.html" download="GJV_Translator.html" class="btn download-btn">
                    <i class="fa-solid fa-download"></i> Download App
                </a>
            </div>
            
            <p style="margin-top:25px; font-size: 0.85rem; color:#94a3b8; font-style: italic;">
                Published by Gyaanpeeth Jatiya Vidyalaya
            </p>
        </div>
    </div>

    <div id="previewModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closePreview()">&times;</span>
            <iframe id="previewIframe" src=""></iframe>
        </div>
    </div>

    <script>
        // Open the preview modal
        function openPreview() {
            const modal = document.getElementById('previewModal');
            const iframe = document.getElementById('previewIframe');
            
            // Set source to load the file
            iframe.src = "gjv-translator-fixed.html";
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Stop page scrolling
        }

        // Close the preview modal
        function closePreview() {
            const modal = document.getElementById('previewModal');
            const iframe = document.getElementById('previewIframe');
            
            modal.style.display = 'none';
            iframe.src = ""; // Kill the iframe to stop music/processes
            document.body.style.overflow = 'auto'; // Restore scrolling
        }

        // Close when clicking outside the window
        window.onclick = function(event) {
            const modal = document.getElementById('previewModal');
            if (event.target == modal) {
                closePreview();
            }
        }
    </script>
</body>
</html>
